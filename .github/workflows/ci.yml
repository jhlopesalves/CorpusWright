name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            legacy:
              - 'legacy/**'
      - if: steps.paths.outputs.legacy == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.paths.outputs.legacy == 'true'
        name: Install project
        working-directory: legacy/pyside
        run: python -m pip install -e ".[dev]"
      - if: steps.paths.outputs.legacy == 'true'
        name: Run pytest
        working-directory: legacy/pyside
        run: python -m pytest -q
      - if: steps.paths.outputs.legacy == 'true'
        name: Compile Python sources
        working-directory: legacy/pyside
        run: python -m compileall src

  rust-preview:
    name: Rust preview crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            legacy:
              - 'legacy/**'
      - if: steps.paths.outputs.legacy == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - if: steps.paths.outputs.legacy == 'true'
        name: Check formatting
        working-directory: legacy/pyside/rust_preview
        run: cargo fmt --check
      - if: steps.paths.outputs.legacy == 'true'
        name: Check Rust crate
        working-directory: legacy/pyside/rust_preview
        run: cargo check --no-default-features
      - if: steps.paths.outputs.legacy == 'true'
        name: Run Rust tests
        working-directory: legacy/pyside/rust_preview
        run: cargo test --no-default-features

  native-extension:
    name: Native extension import (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            legacy:
              - 'legacy/**'
      - if: steps.paths.outputs.legacy == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.paths.outputs.legacy == 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.paths.outputs.legacy == 'true'
        name: Install Python tooling
        working-directory: legacy/pyside
        run: python -m pip install -e ".[dev]" maturin
      - if: steps.paths.outputs.legacy == 'true'
        name: Build native extension wheel
        working-directory: legacy/pyside
        run: maturin build --manifest-path rust_preview/Cargo.toml --release --out dist
      - if: steps.paths.outputs.legacy == 'true'
        name: Install native extension wheel
        working-directory: legacy/pyside
        run: python -c "import glob, subprocess, sys; wheels = glob.glob('dist/*.whl'); assert wheels, 'no wheel built'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', wheels[0]])"
      - if: steps.paths.outputs.legacy == 'true'
        name: Verify native extension import
        working-directory: legacy/pyside
        run: python -c "import corpus_preview; assert hasattr(corpus_preview, 'scan_directory'); assert hasattr(corpus_preview, 'extract_html_text'); assert hasattr(corpus_preview, 'extract_docx_text'); assert hasattr(corpus_preview, 'extract_pdf_text')"
      - if: steps.paths.outputs.legacy == 'true'
        name: Run native extension tests
        working-directory: legacy/pyside
        run: python -m pytest -q -m native tests/test_native_ingestion.py

  rust-core:
    name: Rust core (corpusaid-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy -p corpusaid-core --all-targets -- -D warnings
      - name: Run tests
        run: cargo test -p corpusaid-core
      - name: Check generated TypeScript bindings are up to date
        run: |
          echo "::group::Regenerating TypeScript bindings"
          cargo run -p corpusaid-core --example export_ts
          echo "::endgroup::"

          echo "::group::Checking for stale generated files"
          if [ -n "$(git status --porcelain -- apps/desktop/src/generated/)" ]; then
            echo "ERROR: Generated TypeScript bindings are out of date."
            echo ""
            echo "Run the following command locally and commit the updated files:"
            echo "  cargo run -p corpusaid-core --example export_ts"
            echo ""
            echo "Changed generated files:"
            git status --short -- apps/desktop/src/generated/
            echo ""
            echo "Diff:"
            git diff -- apps/desktop/src/generated/
            exit 1
          fi
          echo "Generated TypeScript bindings are up to date."
          echo "::endgroup::"

  tauri-check:
    name: Tauri check (corpusaid-desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri v2 Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libxdo-dev libssl-dev build-essential libayatana-appindicator3-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check Tauri crate
        run: cargo check -p corpusaid-desktop --all-targets
      - name: Run clippy on Tauri crate
        run: cargo clippy -p corpusaid-desktop --all-targets -- -D warnings

  frontend:
    name: Frontend (Vite + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build
