name: Draft alpha release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.label }}
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows NSIS
            platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: --bundles nsis
          - label: macOS Intel DMG
            platform: macos-latest
            rust-targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - label: macOS Apple Silicon DMG
            platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg

    steps:
      - name: Checkout selected commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Derive canonical release tag from app version
        id: release_metadata
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          echo "App version from tauri.conf.json: ${APP_VERSION}"

          node -e "
          const v = process.argv[1];
          const semverRe = /^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$/;
          const tagRe    = /^v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$/;
          if (!semverRe.test(v)) {
            console.error('FATAL: Version \"' + v + '\" does not match strict alpha semver (required: X.Y.Z-alpha.N)');
            process.exit(1);
          }
          const tag = 'v' + v;
          if (!tagRe.test(tag)) {
            console.error('FATAL: Computed tag \"' + tag + '\" is malformed (required: vX.Y.Z-alpha.N)');
            process.exit(1);
          }
          console.log('release_tag=' + tag);
          console.log('release_name=CorpusWright ' + tag);
          " "${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Computed canonical release tag: v${APP_VERSION}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Ensure platform PDFium library
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/resources/ocr
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Linux: download libpdfium.so (the Git-tracked .rten files are already present)
            curl -sL -o /tmp/pdfium-linux-x64.tgz https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-linux-x64.tgz
            tar -xzf /tmp/pdfium-linux-x64.tgz -C /tmp
            cp /tmp/lib/libpdfium.so apps/desktop/src-tauri/resources/ocr/libpdfium.so
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # macOS: download appropriate arch
            arch_suffix="${{ matrix.rust-targets == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}"
            curl -sL -o /tmp/pdfium-mac.tgz "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-${arch_suffix}.tgz"
            tar -xzf /tmp/pdfium-mac.tgz -C /tmp
            cp /tmp/lib/libpdfium.dylib apps/desktop/src-tauri/resources/ocr/libpdfium.dylib
          fi

      - name: Check release version consistency
        run: node scripts/check-release-consistency.cjs

      - name: Build Tauri artifacts and update draft prerelease
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri
          tagName: ${{ steps.release_metadata.outputs.release_tag }}
          releaseName: ${{ steps.release_metadata.outputs.release_name }}
          releaseBody: |
            Experimental alpha release for manual inspection.

            This prerelease supersedes v0.1.0-alpha.2.

            Important: v0.1.0-alpha.2 Windows installer may fall back to degraded PDF extraction because packaged OCR/PDFium resources were not bundled into the installed app. This alpha.3 fixes installed resource packaging and prevents low-quality degraded PDF fallback output from being presented as normal extracted text.

            Windows and macOS builds may be unsigned or ad-hoc signed. Windows may show SmartScreen warnings. macOS may require users to allow the app from Privacy & Security settings.

            Expected artifacts:
            - Windows NSIS setup executable.
            - macOS DMG for Intel.
            - macOS DMG for Apple Silicon.
          releaseDraft: true
          prerelease: true
          releaseCommitish: ${{ github.sha }}
          args: ${{ matrix.args }}
